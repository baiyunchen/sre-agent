services:
  postgres:
    image: postgres:15
    container_name: sre-agent-db
    environment:
      POSTGRES_DB: sre_agent
      POSTGRES_USER: sre_agent
      POSTGRES_PASSWORD: sre_agent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sre_agent -d sre_agent"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
