openapi: 3.0.3
info:
  title: SRE Agent API Contract
  version: 1.0.0
  description: >
    Contract-first API definition. Update this file before implementing any API
    changes in backend/frontend.
servers:
  - url: http://localhost:5099
tags:
  - name: sre
    description: Alert analysis APIs
  - name: sessions
    description: Session query APIs
  - name: dashboard
    description: Dashboard aggregation APIs
paths:
  /api/sre/analyze:
    post:
      tags: [sre]
      summary: Analyze an incoming alert
      description: |
        API contract must align with frontend design requirements.
        Keep success/empty/error states explicit.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnalyzeRequest'
      responses:
        '200':
          description: Analysis completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyzeResponse'
        '400':
          description: Invalid request
        '500':
          description: Internal error
  /api/sessions:
    get:
      tags: [sessions]
      summary: Get paginated sessions list
      description: |
        Supports pagination, filtering, sorting, and keyword search for sessions.
      parameters:
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: pageSize
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum: [Running, Completed, Failed, WaitingApproval, Cancelled, TimedOut]
        - in: query
          name: source
          required: false
          schema:
            type: string
            enum: [CloudWatch, Prometheus, Slack Manual]
        - in: query
          name: sort
          required: false
          schema:
            type: string
            enum: [createdAt, updatedAt, status]
            default: createdAt
        - in: query
          name: sortOrder
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - in: query
          name: search
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Sessions list returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionListResponse'
        '400':
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/sessions/{sessionId}:
    get:
      tags: [sessions]
      summary: Get session detail by id
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Session detail returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionDetailResponse'
        '404':
          description: Session not found
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/sessions/{sessionId}/timeline:
    get:
      tags: [sessions]
      summary: Get merged session timeline
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Session timeline returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionTimelineResponse'
        '404':
          description: Session not found
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/sessions/{sessionId}/diagnosis:
    get:
      tags: [sessions]
      summary: Get structured diagnosis for a session
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Session diagnosis returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionDiagnosisResponse'
        '404':
          description: Session not found
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/sessions/{sessionId}/tool-invocations:
    get:
      tags: [sessions]
      summary: Get all tool invocations in a session
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Tool invocations returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionToolInvocationsResponse'
        '404':
          description: Session not found
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/sessions/{sessionId}/todos:
    get:
      tags: [sessions]
      summary: Get todo list in a session
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Session todos returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionTodosResponse'
        '404':
          description: Session not found
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/sessions/{sessionId}/messages:
    post:
      tags: [sessions]
      summary: Send a follow-up message in an existing session
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionMessageRequest'
      responses:
        '200':
          description: Session message processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionMessageResponse'
        '404':
          description: Session not found
        '409':
          description: Session cannot accept new messages in current status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/dashboard/stats:
    get:
      tags: [dashboard]
      summary: Get dashboard key statistics
      responses:
        '200':
          description: Dashboard stats returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardStatsResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/dashboard/active-sessions:
    get:
      tags: [dashboard]
      summary: Get active sessions list for dashboard
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
      responses:
        '200':
          description: Active sessions returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardActiveSessionsResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/dashboard/activities:
    get:
      tags: [dashboard]
      summary: Get recent dashboard activities
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Dashboard activities returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardActivitiesResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    AnalyzeRequest:
      type: object
      required: [title, severity, alertTime, affectedService, description]
      properties:
        title:
          type: string
        severity:
          type: string
          enum: [P1, P2, P3]
        alertTime:
          type: string
          format: date-time
        affectedService:
          type: string
        description:
          type: string
        additionalInfo:
          type: string
    AnalyzeResponse:
      type: object
      properties:
        success:
          type: boolean
        analysis:
          type: string
        error:
          type: string
          nullable: true
    SessionSummary:
      type: object
      required: [id, status, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
        alertName:
          type: string
          nullable: true
        alertId:
          type: string
          nullable: true
        serviceName:
          type: string
          nullable: true
        source:
          type: string
          nullable: true
        severity:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        duration:
          type: integer
          nullable: true
          description: Session duration in seconds
        agentSteps:
          type: integer
          nullable: true
    SessionListResponse:
      type: object
      required: [items, total, page, pageSize]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/SessionSummary'
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
    SessionDetailResponse:
      type: object
      required: [id, status, createdAt, updatedAt, agentSteps]
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
        alertId:
          type: string
          nullable: true
        alertName:
          type: string
          nullable: true
        source:
          type: string
          nullable: true
        severity:
          type: string
          nullable: true
        serviceName:
          type: string
          nullable: true
        currentAgentId:
          type: string
          nullable: true
        currentStep:
          type: integer
        agentSteps:
          type: integer
        diagnosisSummary:
          type: string
          nullable: true
        confidence:
          type: number
          format: double
          nullable: true
        duration:
          type: integer
          nullable: true
          description: Session duration in seconds
        createdAt:
          type: string
          format: date-time
        startedAt:
          type: string
          format: date-time
          nullable: true
        completedAt:
          type: string
          format: date-time
          nullable: true
        updatedAt:
          type: string
          format: date-time
    TimelineEvent:
      type: object
      required: [id, eventType, timestamp, title]
      properties:
        id:
          type: string
        eventType:
          type: string
          enum: [message, agent_run, tool_invocation]
        timestamp:
          type: string
          format: date-time
        title:
          type: string
        detail:
          type: string
          nullable: true
        status:
          type: string
          nullable: true
        actor:
          type: string
          nullable: true
    SessionTimelineResponse:
      type: object
      required: [sessionId, events]
      properties:
        sessionId:
          type: string
          format: uuid
        events:
          type: array
          items:
            $ref: '#/components/schemas/TimelineEvent'
    SessionDiagnosisResponse:
      type: object
      required: [sessionId, hypothesis, evidence, recommendedActions]
      properties:
        sessionId:
          type: string
          format: uuid
        hypothesis:
          type: string
        confidence:
          type: number
          format: double
          nullable: true
        evidence:
          type: array
          items:
            type: string
        recommendedActions:
          type: array
          items:
            type: string
        totalRecords:
          type: integer
        severityBreakdown:
          type: object
          additionalProperties:
            type: integer
        sourceBreakdown:
          type: object
          additionalProperties:
            type: integer
        timeWindowStart:
          type: string
          format: date-time
          nullable: true
        timeWindowEnd:
          type: string
          format: date-time
          nullable: true
    ToolInvocationSummary:
      type: object
      required: [id, toolName, status, requestedAt]
      properties:
        id:
          type: string
        agentRunId:
          type: string
        toolName:
          type: string
        status:
          type: string
        approvalStatus:
          type: string
          nullable: true
        errorMessage:
          type: string
          nullable: true
        agentId:
          type: string
          nullable: true
        agentName:
          type: string
          nullable: true
        requestedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true
        durationMs:
          type: integer
          format: int64
    SessionToolInvocationsResponse:
      type: object
      required: [sessionId, items]
      properties:
        sessionId:
          type: string
          format: uuid
        items:
          type: array
          items:
            $ref: '#/components/schemas/ToolInvocationSummary'
    SessionTodoItem:
      type: object
      required: [id, content, status, priority, createdAt, updatedAt]
      properties:
        id:
          type: string
        content:
          type: string
        status:
          type: string
          enum: [pending, in_progress, completed, cancelled]
        priority:
          type: string
          enum: [low, medium, high]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true
    SessionTodosResponse:
      type: object
      required: [sessionId, items]
      properties:
        sessionId:
          type: string
          format: uuid
        items:
          type: array
          items:
            $ref: '#/components/schemas/SessionTodoItem'
    SessionMessageRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
          minLength: 1
    SessionMessageResponse:
      type: object
      required: [sessionId, isSuccess, tokenUsage]
      properties:
        sessionId:
          type: string
          format: uuid
        output:
          type: string
          nullable: true
        isSuccess:
          type: boolean
        error:
          type: string
          nullable: true
        tokenUsage:
          $ref: '#/components/schemas/SessionMessageTokenUsage'
    SessionMessageTokenUsage:
      type: object
      required: [promptTokens, completionTokens, totalTokens]
      properties:
        promptTokens:
          type: integer
        completionTokens:
          type: integer
        totalTokens:
          type: integer
    DashboardStatsResponse:
      type: object
      required: [totalSessionsToday, autoResolutionRate, avgProcessingTimeSeconds, pendingApprovals]
      properties:
        totalSessionsToday:
          type: integer
        autoResolutionRate:
          type: number
          format: double
          description: Percent value in range [0,100]
        avgProcessingTimeSeconds:
          type: integer
        pendingApprovals:
          type: integer
    DashboardActiveSessionSummary:
      type: object
      required: [id, status, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        alertName:
          type: string
          nullable: true
        serviceName:
          type: string
          nullable: true
        status:
          type: string
        currentStep:
          type: integer
        startedAt:
          type: string
          format: date-time
          nullable: true
        updatedAt:
          type: string
          format: date-time
    DashboardActiveSessionsResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/DashboardActiveSessionSummary'
        total:
          type: integer
    DashboardActivityItem:
      type: object
      required: [id, sessionId, eventType, occurredAt]
      properties:
        id:
          type: string
          format: uuid
        sessionId:
          type: string
          format: uuid
        eventType:
          type: string
        description:
          type: string
          nullable: true
        actor:
          type: string
          nullable: true
        occurredAt:
          type: string
          format: date-time
    DashboardActivitiesResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/DashboardActivityItem'
        total:
          type: integer
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
