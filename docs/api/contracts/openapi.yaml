openapi: 3.0.3
info:
  title: SRE Agent API Contract
  version: 1.0.0
  description: >
    Contract-first API definition. Update this file before implementing any API
    changes in backend/frontend.
servers:
  - url: http://localhost:5099
tags:
  - name: sre
    description: Alert analysis APIs
  - name: sessions
    description: Session query APIs
paths:
  /api/sre/analyze:
    post:
      tags: [sre]
      summary: Analyze an incoming alert
      description: |
        API contract must align with frontend design requirements.
        Keep success/empty/error states explicit.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnalyzeRequest'
      responses:
        '200':
          description: Analysis completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyzeResponse'
        '400':
          description: Invalid request
        '500':
          description: Internal error
  /api/sessions:
    get:
      tags: [sessions]
      summary: Get paginated sessions list
      description: |
        Supports pagination, filtering, sorting, and keyword search for sessions.
      parameters:
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: pageSize
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum: [Running, Completed, Failed, WaitingApproval, Cancelled, TimedOut]
        - in: query
          name: source
          required: false
          schema:
            type: string
            enum: [CloudWatch, Prometheus, Slack Manual]
        - in: query
          name: sort
          required: false
          schema:
            type: string
            enum: [createdAt, updatedAt, status]
            default: createdAt
        - in: query
          name: sortOrder
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - in: query
          name: search
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Sessions list returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionListResponse'
        '400':
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/sessions/{sessionId}:
    get:
      tags: [sessions]
      summary: Get session detail by id
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Session detail returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionDetailResponse'
        '404':
          description: Session not found
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    AnalyzeRequest:
      type: object
      required: [title, severity, alertTime, affectedService, description]
      properties:
        title:
          type: string
        severity:
          type: string
          enum: [P1, P2, P3]
        alertTime:
          type: string
          format: date-time
        affectedService:
          type: string
        description:
          type: string
        additionalInfo:
          type: string
    AnalyzeResponse:
      type: object
      properties:
        success:
          type: boolean
        analysis:
          type: string
        error:
          type: string
          nullable: true
    SessionSummary:
      type: object
      required: [id, status, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
        alertName:
          type: string
          nullable: true
        alertId:
          type: string
          nullable: true
        serviceName:
          type: string
          nullable: true
        source:
          type: string
          nullable: true
        severity:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        duration:
          type: integer
          nullable: true
          description: Session duration in seconds
        agentSteps:
          type: integer
          nullable: true
    SessionListResponse:
      type: object
      required: [items, total, page, pageSize]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/SessionSummary'
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
    SessionDetailResponse:
      type: object
      required: [id, status, createdAt, updatedAt, agentSteps]
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
        alertId:
          type: string
          nullable: true
        alertName:
          type: string
          nullable: true
        source:
          type: string
          nullable: true
        severity:
          type: string
          nullable: true
        serviceName:
          type: string
          nullable: true
        currentAgentId:
          type: string
          nullable: true
        currentStep:
          type: integer
        agentSteps:
          type: integer
        diagnosisSummary:
          type: string
          nullable: true
        confidence:
          type: number
          format: double
          nullable: true
        duration:
          type: integer
          nullable: true
          description: Session duration in seconds
        createdAt:
          type: string
          format: date-time
        startedAt:
          type: string
          format: date-time
          nullable: true
        completedAt:
          type: string
          format: date-time
          nullable: true
        updatedAt:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
